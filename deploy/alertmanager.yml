global:
  resolve_timeout: 5m
  smtp_smarthost: ''
  smtp_from: 'alerts@stock-system.local'
  smtp_require_tls: false

route:
  receiver: 'default'
  group_by: ['alertname', 'category']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: 'feishu_critical'
      group_wait: 10s
      repeat_interval: 30m
      continue: true
    - matchers:
        - severity = "warning"
      receiver: 'feishu_warning'
      group_wait: 1m
      repeat_interval: 4h
      continue: true
    - matchers:
        - severity = "info"
      receiver: 'console'
      group_wait: 5m
      repeat_interval: 24h
    - matchers:
        - severity = "critical"
      receiver: 'webhook'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://app:8000/api/stream/publish?topic=system'
        send_resolved: true
        max_alerts: 0

  - name: 'webhook'
    webhook_configs:
      - url: 'http://app:8000/api/stream/publish?topic=system'
        send_resolved: true

  - name: 'console'
    webhook_configs:
      - url: 'http://app:8000/api/stream/publish?topic=system'

  - name: 'feishu_critical'
    webhook_configs:
      - url: 'http://app:8000/api/stream/publish?topic=alert_critical'
        send_resolved: true

  - name: 'feishu_warning'
    webhook_configs:
      - url: 'http://app:8000/api/stream/publish?topic=alert_warning'
        send_resolved: true

templates:
  - name: 'feishu.default.message'
    text: |
      **{{ .GroupLabels.alertname }}** [{{ .GroupLabels.severity }}]

      {{ range .Alerts }}
      **摘要**: {{ .Annotations.summary }}
      **详情**: {{ .Annotations.description }}
      **时间**: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
      **状态**: {{ if eq .Status.state "active" }}激活{{ else }}已恢复{{ end }}
      {{ end }}

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname, category]
  - source_matchers: [severity="critical"]
    target_matchers: [severity="info"]
    equal: [alertname, category]
  - source_matchers: [alertname=~".+"]
    target_matchers: [alertname=~".+Down"]
    equal: [alertname]
