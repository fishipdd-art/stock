server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: stock-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: stock-app
          service: stock-system
          level: info
        __path__: /var/log/stock/*.log

  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          level: info
        __path__: /var/log/stock/system.log

  # Docker container logs (if running in compose)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      - docker: {}
